<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Exploration</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="#">Space Exploration</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Missions</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Gallery</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-text">
            <h1>Discover the Wonders of Space</h1>
            <p>Explore planets, stars, and galaxies like never before.</p>
        </div>
    </header>

    <!-- Spaces (Loaded from API) -->
    <div class="container mt-5">
        <h2 class="text-center">Community Spaces</h2>
        <p class="text-center">Entries are loaded from the backend API.</p>

        <form id="create-space-form" class="mb-4">
            <div class="form-row">
                <div class="col-md-3 mb-2">
                    <input id="space-name" class="form-control" placeholder="Name" required />
                </div>
                <div class="col-md-5 mb-2">
                    <input id="space-description" class="form-control" placeholder="Description" />
                </div>
                <div class="col-md-3 mb-2">
                    <input id="space-image" class="form-control" placeholder="Image URL (optional)" />
                </div>
                <div class="col-md-1 mb-2">
                    <button class="btn btn-info btn-block" type="submit">Add</button>
                </div>
            </div>
        </form>

        <div id="spaces-row" class="row"></div>
    </div>

    <!-- Footer -->
    <footer class="footer bg-dark text-white text-center py-3">
        <p>&copy; 2025 Space Exploration</p>
    </footer>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.4.4/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
      const apiBase = window.API_BASE || 'http://localhost:4000';

      function cardTemplate(space){
        const img = space.image_url || 'https://via.placeholder.com/600x300?text=Space';
        const desc = space.description || '';
        return `
          <div class="col-md-4" data-id="${space.id}">
            <div class="card mb-4">
              <img src="${img}" class="card-img-top" alt="${space.name}">
              <div class="card-body text-center">
                <h5 class="card-title">${space.name}</h5>
                <p class="card-text">${desc}</p>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteSpace('${space.id}')">Delete</button>
              </div>
            </div>
          </div>`
      }

      async function loadSpaces(){
        const res = await fetch(`${apiBase}/api/spaces`);
        const spaces = await res.json();
        const row = document.getElementById('spaces-row');
        row.innerHTML = spaces.map(cardTemplate).join('');
      }

      async function deleteSpace(id){
        await fetch(`${apiBase}/api/spaces/${id}`, { method: 'DELETE' });
        const el = document.querySelector(`[data-id="${id}"]`);
        if (el) el.remove();
      }

      document.getElementById('create-space-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('space-name').value.trim();
        const description = document.getElementById('space-description').value.trim();
        const image_url = document.getElementById('space-image').value.trim();
        if (!name) return;
        const res = await fetch(`${apiBase}/api/spaces`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, description, image_url })
        });
        const created = await res.json();
        const row = document.getElementById('spaces-row');
        row.insertAdjacentHTML('afterbegin', cardTemplate(created));
        e.target.reset();
      });

      loadSpaces();
    </script>
</body>
</html>
